<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: #fff;
      text-align: center;
    }
    header {
      padding: 60px 20px;
    }
    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }
    p {
      font-size: 18px;
      opacity: 0.9;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #fff;
      color: #333;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
    }
    footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <header>
    <h1>Welcome to My Website 🚀</h1>
    <p>This is my first GitHub Pages website</p>
    <a class="btn" href="#">Get Started</a>
  </header>

  <footer>
    © 2026 My Website | Built with GitHub Pages
  </footer>

</body>
</html>
